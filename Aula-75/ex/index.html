<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Exercício: Promise de Pagamento</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .caixa {
            margin: 20px 0;
            padding: 15px;
            border: 2px solid #ccc;
            font-weight: bold;
            border-radius: 5px;
        }

        /* Classes que o JS vai adicionar */
        .processando {
            color: #007bff;
            border-color: #007bff;
        }

        .sucesso {
            color: #28a745;
            border-color: #28a745;
        }

        .erro {
            color: #dc3545;
            border-color: #dc3545;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Finalizar Compra</h1>
        <div id="status" class="caixa">Aguardando ação...</div>
        <button id="btn-pagar">Confirmar Pagamento</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
