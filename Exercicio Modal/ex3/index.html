<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="menu">
        <div class="menu_cards">
            <div class="menu_card" data-product="Mussarella">
                <h1>Pizza Mussarella</h1>
                <button class="btn_ver_mais">
                    Ver Mais
                </button>
            </div>
            <div class="menu_card" data-product="Calabresa">
                <h1>Pizza Calabresa</h1>
                <button class="btn_ver_mais">
                    Ver Mais
                </button>
            </div>
            <div class="menu_card" data-product="quatro_queijos">
                <h1>Pizza 4 queijos</h1>
                <button class="btn_ver_mais">
                    Ver Mais
                </button>
            </div>
        </div>
    </section>

    <dialog class="modal">
        <button class="btn_fechar_modal">X</button>
        <p>Ingredientes: <span class="modal_ingredientes"> </span></p>
        <p>Preço: <span class="modal_preco"> </span></p>
        <p>Calorias: <span class="modal_calorias"> </span></p>
    </dialog>
    <script src="script.js"></script>
</body>
</html>
