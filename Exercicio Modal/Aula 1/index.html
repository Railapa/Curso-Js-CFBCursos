<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button class="open_modal" data-modal="modal_1">
        Open Modal
    </button>

    <dialog id="modal_1">
        <form>
            <div class="modal_header">
                <h1 class="modal_title">
                    Sing in to our plataform
                </h1>
                <button class="close_modal" data-modal="modal_1" type="button">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="modal-body">
                <div class="input_group">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="name@exemple.com">
                </div>

                <div class="input_group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" placeholder="•••••••••••">
                </div>

                <div class="password_options">
                    <div class="remember_password">
                        <input type="checkbox" name="remember_password" id="remember_password">
                        <label for="remember_password">Remember Password</label>
                    </div>

                    <a href="#" class="forgot_password">Forgot Password?</a>
                </div>

                <button id="login_btn">
                    Login to your account
                </button>

                <div class="register">
                    <span>Not Registered?</span>
                    <a href="#">Login Here</a>
                </div>
            </div>
        </form>
    </dialog>
    <script src="script.js"></script>
</body>

</html>
