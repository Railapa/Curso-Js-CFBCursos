<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        dialog{
            padding: 20px;
            border-radius: 8px;
            border-color: rgb(255, 0, 0);
            background-color: rgb(41, 41, 41);
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>

<body>
    <section class="container">
        <div class="cards">
            <div class="card" data-jogador="PaulPogba">
                <h2>Paul Pogba</h2>
                <button class="btn_ver_mais">Ver Mais</button>
            </div>
            <div class="card" data-jogador="CR7">
                <h2>Cristiano Ronaldo</h2>
                <button class="btn_ver_mais">Ver Mais</button>
            </div>
            <div class="card" data-jogador="Valverde">
                <h2>Frederico Valverde</h2>
                <button class="btn_ver_mais">Ver Mais</button>
            </div>
        </div>
    </section>

    <dialog class="modal">
        <button class="btn_close_modal">X</button>
        <p>Nome: <span class="modal_nome"></span></p>
        <p>Idade: <span class="modal_idade"></span></p>
        <p>Principal Titulo: <span class="modal_titulo"></span></p>
    </dialog>

    <script src="script.js"></script>
</body>

</html>
