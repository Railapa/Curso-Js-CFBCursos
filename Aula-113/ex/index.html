<body>
    <main class="container">
    <h1>📍 Rastreador de Posição</h1>

    <div id="obj_red" style="width: 80px; height: 80px; background: #ef4444; cursor: pointer; margin-bottom: 50px;"></div>
    <div id="obj_blue" style="width: 120px; height: 60px; background: #3b82f6; cursor: pointer; margin-left: 100px;"></div>
