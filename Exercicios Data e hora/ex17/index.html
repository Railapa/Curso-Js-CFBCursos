<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Controle de Acesso</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #ecf0f1;
        }

        .painel {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 400px;
        }

        #status_acesso {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            border: 2px solid #bdc3c7;
        }

        .liberado {
            background-color: #2ecc71;
            color: white;
            border-color: #27ae60 !important;
        }

        .bloqueado {
            background-color: #e74c3c;
            color: white;
            border-color: #c0392b !important;
        }

        .info {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 25px;
            cursor: pointer;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 5px;
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="painel">
        <h3>🔒 Área Restrita</h3>
        <p class="info">Acesso permitido apenas em dias úteis, das 08h às 18h.</p>
        <button id="btn_acessar">Tentar Entrar</button>
        <div id="status_acesso">Aguardando verificação...</div>
    </div>

    <script src="ex17.js"></script>
</body>

</html>
