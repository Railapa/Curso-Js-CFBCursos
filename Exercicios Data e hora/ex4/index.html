<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gerador de Data</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #f0f2f5;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        .resultado {
            margin-top: 20px;
            font-weight: bold;
            color: #2c3e50;
            min-height: 40px;
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #8e44ad;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="card">
        <h3>Hoje é dia de quê?</h3>
        <button id="btn_gerar">Gerar Data Completa</button>
        <div id="resultado_data" class="resultado">Clique no botão...</div>
    </div>

    <script src="ex4.js"></script>
</body>

</html>
