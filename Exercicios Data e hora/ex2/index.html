<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Saudação Automática</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #2c3e50;
            color: white;
        }

        .card {
            background: #34495e;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        #mensagem_saudacao {
            font-size: 1.5rem;
            margin-top: 20px;
            font-weight: bold;
            color: #f1c40f;
        }

        button {
            padding: 12px 25px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background: #e67e22;
            color: white;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="card">
        <h3>Sistema de Boas-Vindas</h3>
        <button id="btn_saudar">Ver Saudação</button>
        <div id="mensagem_saudacao">Clique para ser saudado!</div>
    </div>

    <script src="ex2.js"></script>
</body>

</html>
