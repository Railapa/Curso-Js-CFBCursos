<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Saudação Completa</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #71b7e6, #9b59b6);
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        #data_extenso {
            font-size: 1.2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #relogio_digital {
            font-size: 4rem;
            font-weight: bold;
            margin: 10px 0;
        }

        #mensagem_dia {
            font-style: italic;
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="data_extenso">Carregando data...</div>
        <div id="relogio_digital">00:00:00</div>
        <div id="mensagem_dia">Preparando saudação...</div>
    </div>

    <script src="ex16.js"></script>
</body>

</html>
