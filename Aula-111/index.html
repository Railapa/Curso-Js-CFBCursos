<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            border: none;
        }
        .painel{
            position: relative;
            display: flex;
            width: 100%;
            justify-content: flex-start;
            align-items: center;
            background-color: #eee;

            button{
                width: 150px;
                height: 30px;
                border-radius: 10px;
                cursor: pointer;
                margin: 10px;
                background-color: #ccc;
            }
        }

        .carro{
            background-color: #f00;
            transition: all 0.4s ease;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="painel" id="painel">
        <button id="btn_parar">Parar</button>
        <button id="btn_rodar">Rodar</button>
    </div>
    <div class="carro" id="carro">

    </div>
    <script src="animacoes.js"></script>
</body>
</html>
