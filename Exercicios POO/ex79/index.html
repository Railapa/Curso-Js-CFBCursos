<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 416 - Objetos Literais</title>
    <style>
        body { background: #111827; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1f2937; padding: 25px; border-radius: 15px; border: 1px solid #374151; width: 300px; text-align: center; }
        h2 { color: #60a5fa; margin-top: 0; }
        .info { text-align: left; background: #111827; padding: 15px; border-radius: 8px; margin: 15px 0; font-family: monospace; }
        button { background: #3b82f6; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>

    <div class="card">
        <h2>👤 Perfil do Usuário</h2>
        <div id="display" class="info"></div>
        <button id="btn_aniversario">Fazer Aniversário (+1)</button>
    </div>

    <script src="ex79.js"></script>

</html>
