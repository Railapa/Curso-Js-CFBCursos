<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Calculadora de Autonomia</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background: #2f3640;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #dcdde1;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #f1c40f;
            color: #2f3640;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="card">
        <h3>⛽ Autonomia do Carro</h3>
        <input type="number" id="in_litros" placeholder="Litros no tanque">
        <input type="number" id="in_consumo" placeholder="Km por litro (ex: 12)">
        <button id="btn_calcular">Calcular Alcance</button>

        <div id="painel_viagem"
            style="display:none; margin-top:20px; border-left: 5px solid #f1c40f; padding-left: 15px;">
            <p>Você ainda pode rodar:</p>
            <p><strong id="res_km" style="font-size: 20px;"></strong> <strong>km</strong></p>
        </div>
    </div>
    <script src="ex56.js"></script>
</body>

</html>
