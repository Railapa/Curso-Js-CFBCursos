<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Média Escolar Class</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background: #f3f4f6;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="card">
        <h3>🎓 Média Escolar</h3>
        <input type="number" id="in_nota1" placeholder="Nota 1">
        <input type="number" id="in_nota2" placeholder="Nota 2">
        <button id="btn_gerar">Verificar Resultado</button>

        <div id="painel_aluno" style="display:none; margin-top:20px; padding: 15px; border-radius: 10px;">
            <p>Média: <span id="res_media"></span></p>
            <p>Status: <strong id="res_status"></strong></p>
        </div>
    </div>
    <script src="ex58.js"></script>
</body>

</html>
