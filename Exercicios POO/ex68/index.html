<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <meta charset="UTF-8">
    <title>Herança de Veículos</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background: #f4f7f6;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="card">
        <h3>🚗 Cadastro de Veículo</h3>

        <input type="text" id="in_marca" placeholder="Marca (ex: Toyota)">
        <input type="text" id="in_modelo" placeholder="Modelo (ex: Corolla)">

        <button id="btn_exibir">Exibir Detalhes</button>

        <div id="painel_carro"
            style="display:none; margin-top:20px; border-left: 4px solid #3498db; padding-left: 15px; text-align: left;">
            <p id="res_detalhes"></p>
        </div>
    </div>
    <script src="ex68.js"></script>
</body>

</html>
