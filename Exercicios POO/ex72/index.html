<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <meta charset="UTF-8">
    <title>Exercício Prototype</title>
    <style>
        body {
            font-family: sans-serif;
            background: #222;
            color: #eee;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .card {
            background: #333;
            padding: 25px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
            border: 1px solid #444;
        }

        #log {
            background: #111;
            padding: 10px;
            margin: 15px 0;
            border-radius: 5px;
            font-family: monospace;
            text-align: left;
            min-height: 50px;
        }

        button {
            background: #eab308;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="card">
        <h3>⚔️ Arena Prototype</h3>
        <div id="log">Aguardando ação...</div>
        <button id="btn_upgrade">Aplicar Upgrade (Prototype)</button>
    </div>
    <script src="ex72.js"></script>
</body>

</html>
