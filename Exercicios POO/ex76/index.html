<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Catálogo de Jogos | Aula 90</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }

        #vitrine {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .jogo-card {
            background: #1e293b;
            border: 2px solid #334155;
            padding: 20px;
            border-radius: 12px;
            width: 220px;
            text-align: center;
        }

        .titulo {
            font-size: 1.4rem;
            font-weight: bold;
            color: #38bdf8;
            display: block;
        }

        .preco {
            font-size: 1.1rem;
            color: #fbbf24;
            margin: 10px 0;
            display: block;
        }

        .tag {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .promocao {
            background: #15803d;
            color: #fff;
        }

        .premium {
            background: #b91c1c;
            color: #fff;
        }
    </style>
</head>

<body>
    <h1>🎮 Game Store</h1>
    <div id="vitrine"></div>

    <script src="ex76.js"></script>
</body>

</html>
