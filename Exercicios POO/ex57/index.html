<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Calculadora de IMC Class</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background: #f8fafc;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0284c7;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="card">
        <h3>⚖️ Cálculo de IMC</h3>
        <input type="number" id="in_peso" placeholder="Peso (ex: 70)">
        <input type="number" id="in_altura" placeholder="Altura (ex: 1.75)">
        <button id="btn_calcular">Calcular IMC</button>

        <div id="painel_imc"
            style="display:none; margin-top:20px; background: #f0f9ff; padding: 15px; border-radius: 10px; border: 1px solid #bae6fd;">
            <p>Seu IMC é: <strong id="res_imc"></strong></p>
        </div>
    </div>
    <script src="ex57.js"></script>
</body>

</html>
