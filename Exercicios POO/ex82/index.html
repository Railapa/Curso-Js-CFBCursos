<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produtos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        .container {
            width: 300px;
            margin: 50px auto;
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            display: block;
            width: 90%;
            margin: 10px auto;
            padding: 8px;
        }

        button {
            padding: 10px;
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        .produto {
            background: #eee;
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Cadastro de Produtos</h1>

        <input type="text" id="nome" placeholder="Nome do produto">
        <input type="number" id="preco" placeholder="Preço">
        <button id="btn_cadastrar">Cadastrar</button>

        <div id="lista"></div>
    </div>

    <script src="ex82.js"></script>
</body>

</html>
