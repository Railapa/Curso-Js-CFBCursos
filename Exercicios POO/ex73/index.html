<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <meta charset="UTF-8">
    <title>Loja Prototype</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f4f4f9;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        #lista_produtos {
            text-align: left;
            background: #fffbe6;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ffe58f;
            margin-bottom: 15px;
            font-family: monospace;
        }

        button {
            background: #52c41a;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        button:hover {
            background: #389e0d;
        }
    </style>
</head>

<body>
    <div class="card">
        <h3>🛒 Minha Loja</h3>
        <div id="lista_produtos">Carregando estoque...</div>
        <button id="btn_desconto">Aplicar Promoção (-10%)</button>
    </div>
    <script src="ex73.js"></script>
</body>

</html>
