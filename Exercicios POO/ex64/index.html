<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Editor de Card Class</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background: #f0f2f5;
        }

        .container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .card-preview {
            width: 250px;
            padding: 20px;
            background: #3498db;
            color: white;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .controles {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input,
        button {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        button {
            background: #2c3e50;
            color: white;
            cursor: pointer;
            border: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="preview_card" class="card-preview">
            <h4 id="res_titulo">Título de Exemplo</h4>
            <p>Este é um card gerenciado por uma Classe JS.</p>
        </div>

        <div class="controles">
            <input type="text" id="in_texto" placeholder="Novo título">
            <button id="btn_texto">Mudar Texto</button>

            <hr>

            <input type="color" id="in_cor" value="#3498db">
            <button id="btn_cor">Mudar Cor de Fundo</button>
        </div>
    </div>
    <script src="ex64.js"></script>
</body>

</html>
