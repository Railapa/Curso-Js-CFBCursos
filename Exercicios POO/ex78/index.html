<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 394 - Upgrade PC</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .pc-case { background: #1e293b; padding: 20px; border-radius: 10px; border: 3px solid #334155; display: inline-block; min-width: 350px; }
        .info { text-align: left; background: #000; padding: 15px; border-radius: 5px; margin-top: 20px; color: #4ade80; font-family: monospace; }
        .controles { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        button { padding: 10px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        .btn-upgrade { background: #f59e0b; color: #000; }
        .btn-delete { background: #ef4444; color: #fff; }
    </style>
</head>
<body>
    <div class="pc-case">
        <h2>🖥️ Meu Computador</h2>
        <div id="display-pc" class="info"></div>
        
        <div class="controles">
            <button class="btn-upgrade" id="btn_upgrade">Instalar Placa de Vídeo</button>
            <button class="btn-delete" id="btn_remover">Remover HD Antigo</button>
        </div>
    </div>

    <script src="ex78.js"></script>
</body>
</html>
