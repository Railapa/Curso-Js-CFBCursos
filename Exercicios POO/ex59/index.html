<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <meta charset="UTF-8">
    <title>Sistema Bancário Class</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background: #dfe6e9;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2d3436;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="card">
        <h3>💰 Minha Conta</h3>
        <p>Saldo Atual: <strong id="res_saldo">1000</strong>€</p>

        <input type="number" id="in_saque" placeholder="Quanto deseja sacar?">
        <button id="btn_sacar">Confirmar Saque</button>

        <p id="msg_banco" style="margin-top:20px; font-weight:bold;"></p>
    </div>
    <script src="ex59.js"></script>
</body>

</html>
