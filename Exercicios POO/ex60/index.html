<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Login Class</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background: #2c3e50;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="card">
        <h3>🔒 Acesso Restrito</h3>
        <input type="password" id="in_senha" placeholder="Digite a senha">
        <button id="btn_entrar">Entrar</button>

        <p id="msg_login" style="margin-top:20px;"></p>
        <p>Tentativas restantes: <span id="res_tentativas">3</span></p>
    </div>
    <script src="ex60.js"></script>
</body>

</html>
