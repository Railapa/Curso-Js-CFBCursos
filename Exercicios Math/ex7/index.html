<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Sorteador de Intervalo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h3>🎁 Sorteador de Intervalo</h3>
        <p>Defina o intervalo para o sorteio:</p>
        
        <input type="number" id="in_min" placeholder="Mínimo (ex: 10)">
        <input type="number" id="in_max" placeholder="Máximo (ex: 50)">
        
        <div id="res_sorteio">Quem será o sortudo?</div>
        
        <button id="btn_sortear">Sortear Número</button>
    </div>
    <script src="ex7.js"></script>
</body>
</html>
