<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Desafio Final Math</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h3>⚡ Potência Aleatória</h3>
        
        <div class="display-base">
            <p>Base Sorteada:</p>
            <strong id="base_num">?</strong>
        </div>

        <p>Escolha o expoente:</p>
        <input type="number" id="in_expoente" placeholder="Ex: 2 ou 3">
        
        <div id="res_final">Aguardando base e cálculo...</div>
        
        <button id="btn_gerar_base" class="btn-sortear">1. Gerar Nova Base</button>
        <button id="btn_calcular_potencia" class="btn-calc">2. Calcular Potência</button>
    </div>
    <script src="ex.js"></script>
</body>
</html>
