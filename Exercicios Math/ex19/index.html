<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 414 - Estatísticas Math</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <h1>📊 Analisador de Notas</h1>
        
        <div class="card">
            <p>Notas do Semestre: <strong>7.5, 9.2, 5.8, 8.0</strong></p>
            <button id="btn_analisar" class="btn primary">Analisar Extremos</button>
            
            <div class="resultados">
                <p>Maior Nota: <span id="maior" class="destaque">-</span></p>
                <p>Menor Nota: <span id="menor" class="destaque">-</span></p>
            </div>
        </div>

        <div class="card">
            <h3>Calculadora de Potência (2¹⁰)</h3>
            <button id="btn_potencia" class="btn secondary">Calcular 2 elevado a 10</button>
            <p id="res_potencia" class="resultado">-</p>
        </div>

        <div class="card">
            <h3>Raiz Quadrada de 144</h3>
            <button id="btn_raiz" class="btn secondary">Descobrir Raiz</button>
            <p id="res_raiz" class="resultado">-</p>
        </div>
    </main>

    <script src="ex19.js"></script>
</body>
</html>
