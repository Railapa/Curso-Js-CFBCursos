<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Viagem - Math</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h3>🚗 Calculador de Viagem</h3>
        <p>Insira a distância ou valor (ex: 5.75):</p>
        
        <input type="number" step="0.01" id="in_valor" placeholder="0.00">
        
        <div id="res_viagem">Aguardando valor...</div>
        
        <button id="btn_calcular">Processar Valor</button>
    </div>
    <script src="ex3.js"></script>
</body>
</html>
