<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Científica Math</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }
        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            border: 1px solid #334155;
        }
        h2 { color: #38bdf8; margin-bottom: 20px; }
        input {
            width: 80%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        button {
            width: 88%;
            padding: 12px;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #7dd3fc; }
        .resultados {
            margin-top: 25px;
            text-align: left;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .highlight { color: #fbbf24; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>📐 Math Geometry</h2>
        <input type="number" id="in_raio" placeholder="Digite o raio (cm)">
        
        <button id="btn_calcular">Calcular Geometria</button>

        <div class="resultados">
            <p>Área do Círculo: <span id="res_area" class="highlight">---</span></p>
            <p>Volume da Esfera: <span id="res_volume" class="highlight">---</span></p>
            <p>Raiz Quadrada do Raio: <span id="res_raiz" class="highlight">---</span></p>
        </div>
    </div>
    
    <script src="ex16.js"></script>
</body>
</html>
