<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background: #f0fdf4;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h3 {
            color: #166534;
        }

        input {
            width: 80%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        #res_dado {
            font-size: 3rem;
            font-weight: bold;
            color: #15803d;
            margin: 20px 0;
            min-height: 60px;
        }

        button {
            background: #22c55e;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>
    <div class="card">
        <h3>🎲 Lançador de Dados</h3>
        <p>Quantas faces tem o dado?</p>
        <input type="number" id="in_faces" value="6" min="2">

        <div id="res_dado">--</div>

        <button id="btn_lancar">Lançar Dado</button>
    </div>
    <script src="ex1.js"></script>
</body>

</html>
