<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Exercício 415 - RPG Math Combat</title>
    <style>
        body {
            background: #09090b;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .game-container {
            background: #18181b;
            border: 2px solid #27272a;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 350px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #dc2626;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
        }

        .display-dano {
            font-size: 3rem;
            font-weight: 800;
            margin: 20px 0;
            min-height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }

        .critico {
            color: #facc15;
            text-shadow: 0 0 15px rgba(250, 204, 21, 0.5);
            transform: scale(1.2);
        }

        .erro {
            color: #71717a;
            font-size: 1.5rem;
        }

        .normal {
            color: #f4f4f5;
        }

        button {
            background: #dc2626;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: 0.3s;
        }

        button:hover {
            background: #b91c1c;
            transform: translateY(-2px);
        }

        .log {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #a1a1aa;
            border-top: 1px solid #27272a;
            padding-top: 15px;
        }
    </style>
</head>

<body>

    <div class="game-container">
        <h1>⚔️ Ataque!</h1>
        <div id="display" class="display-dano normal">0</div>
        <button id="btn_atacar">DESFERIR GOLPE</button>
        <div id="log" class="log">Aguardando início do combate...</div>
    </div>

    <script src="ex20.js"></script>
</body>

</html>
