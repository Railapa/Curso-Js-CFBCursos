<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício de Validação JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Inscrição de Desenvolvedor</h2>
        <!-- novalidate impede o balão padrão do Chrome/Edge -->
        <form id="form-inscricao" novalidate>
            <div class="campo">
                <label for="email">E-mail Corporativo:</label>
                <input type="email" id="email" required placeholder="exemplo@dev.com">
            </div>

            <div class="campo">
                <label for="nota">Nota do Teste (0-10):</label>
                <input type="number" id="nota" min="0" max="10" required>
            </div>

            <button type="submit" id="btn-enviar">Finalizar Inscrição</button>
        </form>

        <!-- Aqui aparecerá sua mensagem personalizada -->
        <p id="mensagem-status" class="status-erro"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
