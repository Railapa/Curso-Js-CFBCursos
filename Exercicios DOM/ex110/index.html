<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Logística Express</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #f0f4f8;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }

        input {
            padding: 12px;
            width: 80%;
            border: 2px solid #3498db;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        button {
            padding: 12px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 90%;
        }

        #rastreio_info {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #f9f9f9;
            border-left: 5px solid #ccc;
            text-align: left;
            min-height: 60px;
        }

        .status-badge {
            font-weight: bold;
            color: #2980b9;
        }
    </style>
</head>

<body>

    <div class="card">
        <h3>📦 Rastreio de Objeto</h3>
        <input type="text" id="input_codigo" placeholder="Ex: BR123, PT456 ou US789">
        <button id="btn_rastrear">Rastrear Agora</button>

        <div id="rastreio_info">Insira o código para rastrear...</div>
    </div>

    <script src="ex110.js"></script>
</body>

</html>
