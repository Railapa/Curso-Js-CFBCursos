<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Reserva de Hotel</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #f1f2f6;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }

        .info {
            margin: 15px 0;
            font-size: 0.9rem;
            color: #555;
            text-align: left;
            background: #eee;
            padding: 10px;
            border-radius: 8px;
        }

        button {
            padding: 12px;
            background: #1e90ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        #msg_reserva {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
        }

        .disponivel {
            background: #2ecc71;
            color: white;
        }

        .indisponivel {
            background: #e74c3c;
            color: white;
        }
    </style>
</head>

<body>
    <div class="card">
        <h3>🏨 Reserva de Quartos</h3>
        <p>Buscando quarto para <strong>4 pessoas</strong>.</p>
        <div class="info">
            - Quarto 101: 2 pessoas (Livre)<br>
            - Quarto 102: 4 pessoas (Ocupado)<br>
            - Quarto 103: 4 pessoas (Livre)<br>
            - Quarto 104: 2 pessoas (Ocupado)
        </div>
        <button id="btn_buscar">Verificar Disponibilidade</button>
        <div id="msg_reserva">Aguardando busca...</div>
    </div>
    <script src="ex126.js"></script>
</body>

</html>
