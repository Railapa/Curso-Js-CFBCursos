<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Prática JS - Conversor</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #e8f5e9; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background: #2e7d32; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #resultado { margin-top: 20px; color: #1b5e20; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Conversor de Moedas</h3>
        <input type="number" id="valorDolar" placeholder="Valor em US$">
        <button id="btnConverter">Converter para R$</button>
        <h2 id="resultado"></h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
