<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Logística de Entrega</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #f1f2f6;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }

        .lista-produtos {
            text-align: left;
            margin: 15px 0;
            font-size: 0.9rem;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 5px;
        }

        button {
            padding: 12px;
            background: #2f3542;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        #resultado_logistica {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
        }

        .aviso-fragil {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .envio-comum {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>

<body>

    <div class="container">
        <h3>📦 Resumo da Compra</h3>
        <div class="lista-produtos">
            - Smartphone <br>
            - Capinha <br>
            - Película de Vidro (Frágil) <br>
            - Carregador
        </div>

        <button id="btn_calcular">Calcular Frete</button>

        <div id="resultado_logistica">Aguardando...</div>
    </div>

    <script src="ex118.js"></script>
</body>

</html>
