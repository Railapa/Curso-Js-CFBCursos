<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            background-color: #f4f4f9;
        }

        .painel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 350px;
        }

        h3 {
            color: #333;
            margin-top: 0;
        }

        input {
            width: 90%;
            padding: 10px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
        }

        .linha-botoes {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8em;
            transition: 0.2s;
        }

        /* Cores para diferenciar as ações */
        .add {
            background-color: #2ecc71;
            color: white;
        }

        .add:hover {
            background-color: #27ae60;
        }

        .rem {
            background-color: #e74c3c;
            color: white;
        }

        .rem:hover {
            background-color: #c0392b;
        }

        #display-lista {
            margin-top: 30px;
            padding: 20px;
            background: #2c3e50;
            color: #ecf0f1;
            border-radius: 8px;
            min-width: 300px;
            text-align: center;
            font-size: 1.2em;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <div class="painel">
        <input type="text" id="input-fruta" placeholder="Digite uma fruta...">
        <div class="controles">
            <button id="btn-topo">Colocar no Topo (unshift)</button>
            <button id="btn-fundo">Colocar no Fundo (push)</button>
        </div>
        <div class="controles">
            <button id="btn-tirar-topo">Tirar do Topo (shift)</button>
            <button id="btn-tirar-fundo">Tirar do Fundo (pop)</button>
        </div>
    </div>
    <p id="display-lista">Lista vazia</p>
    <script src="ex89.js"></script>
</body>

</html>
