<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Prática JS - Busca em Array</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background: #fdfdfd;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
            border: 1px solid #eee;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #512da8;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #msgBusca {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="card">
        <h3>Buscar na Equipe</h3>
        <input type="text" id="inputNome" placeholder="Digite um nome...">
        <button id="btnBuscar">Verificar</button>
        <p id="msgBusca"></p>
    </div>

    <script src="script.js"></script>
</body>

</html>
