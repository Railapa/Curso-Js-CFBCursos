<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prática JS - Lista de Compras</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #e9ecef; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 350px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .total-section { margin-top: 20px; border-top: 2px solid #333; padding-top: 10px; text-align: right; }
    </style>
</head>
<body>

    <div class="container">
        <h3>Lista de Compras</h3>
        <input type="text" id="produto" placeholder="Nome do produto">
        <input type="number" id="preco" placeholder="Preço (ex: 5.50)">
        <button id="btnAdicionar">Adicionar</button>

        <ul id="listaItens"></ul>

        <div class="total-section">
            <strong>Total: R$ <span id="valorTotal">0.00</span></strong>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
