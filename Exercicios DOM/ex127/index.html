<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Checkout de Compras</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #f7f1e3;
        }

        .checkout-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 320px;
            text-align: center;
        }

        .itens {
            text-align: left;
            margin: 15px 0;
            border-bottom: 2px dashed #d1ccc0;
            padding-bottom: 10px;
        }

        #total_compra {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c3e50;
            margin-top: 10px;
        }

        button {
            padding: 12px;
            background: #ff5252;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="checkout-card">
        <h3>🛒 Seu Carrinho</h3>
        <div class="itens">
            - Camiseta: R$ 50<br>
            - Calça: R$ 120<br>
            - Tênis: R$ 230
        </div>
        <button id="btn_fechar">Calcular Total</button>
        <div id="total_compra">R$ 0,00</div>
    </div>
    <script src="ex127.js"></script>
</body>

</html>
