<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Biblioteca Central</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #eef2f3;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 350px;
        }

        select,
        input {
            padding: 10px;
            width: 90%;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        button {
            padding: 12px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 95%;
            font-weight: bold;
        }

        #resultado_busca {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #fff;
            border: 2px dashed #2c3e50;
            min-height: 50px;
        }

        .localizacao {
            color: #e67e22;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>

    <div class="box">
        <h3>📚 Localizar Livro</h3>

        <select id="select_categoria">
            <option value="Ficção">Ficção</option>
            <option value="Terror">Terror</option>
            <option value="História">História</option>
        </select>

        <input type="text" id="input_titulo" placeholder="Nome do livro (Ex: Hobbit)">

        <button id="btn_localizar">Verificar Corredor</button>

        <div id="resultado_busca">Informe os dados para busca...</div>
    </div>

    <script src="ex113.js"></script>
</body>

</html>
