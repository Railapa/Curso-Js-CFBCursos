<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prática JS - Cronômetro</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #222;
            color: #fff;
        }

        #visor {
            font-size: 5rem;
            margin-bottom: 20px;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }

        .controles {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }

        #btnStart {
            background: #27ae60;
            color: white;
        }

        #btnStop {
            background: #e74c3c;
            color: white;
        }
    </style>
</head>

<body>

    <div id="visor">0</div>
    <div class="controles">
        <button id="btnStart">Iniciar</button>
        <button id="btnStop">Parar</button>
        <button id="btnZerar">Zerar</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
