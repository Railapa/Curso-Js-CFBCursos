<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gateway de Pagamento</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding: 50px;
            background: #1c1c1c;
        }

        .maquininha {
            background: #595959;
            color: white;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            background: #28a745;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        #visor {
            background: #a7c0a7;
            color: #1d2b1d;
            padding: 15px;
            border-radius: 5px;
            min-height: 40px;
            margin-bottom: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            text-align: center;
        }

        .msg-erro {
            color: #721c24;
            background: #f8d7da;
            padding: 5px;
            border-radius: 3px;
        }

        .msg-sucesso {
            color: #155724;
            background: #d4edda;
            padding: 5px;
            border-radius: 3px;
        }
    </style>
</head>

<body>

    <div class="maquininha">
        <div id="visor">INSIRA O VALOR</div>
        <input type="number" id="valor_compra" placeholder="R$ 0,00">
        <button id="btn_pagar">CONFIRMAR PAGAMENTO</button>
    </div>

    <script src="ex97.js"></script>
</body>

</html>
