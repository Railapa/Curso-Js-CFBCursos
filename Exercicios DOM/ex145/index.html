<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Teste de Conexão</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #2f3640;
            color: white;
        }

        .box {
            background: #353b48;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            width: 300px;
            text-align: center;
        }

        button {
            padding: 12px;
            width: 100%;
            background: #44bd32;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        #status {
            margin-top: 20px;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div class="box">
        <h3>⚡ Status da Rede</h3>
        <input type="number" id="in_ping" placeholder="Digite seu ping">
        <button id="btn_conectar">Testar Conexão</button>
        <p id="status">Sistema offline...</p>
    </div>
    <script src="ex145.js"></script>
</body>

</html>
