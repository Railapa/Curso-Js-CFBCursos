<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 30px;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cofrinho {
            background-color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 350px;
            width: 100%;
        }

        #valores {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 20px;
            padding: 10px;
            background: #eef2f3;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover {
            background-color: #219150;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        #resultado-total {
            margin-top: 25px;
            color: #2c3e50;
            font-size: 1.8rem;
            padding: 10px;
            border-top: 2px solid #27ae60;
            display: none;
            /* Começa escondido para aparecer via JS */
        }
    </style>
</head>

<body>
    <div class="cofrinho">
        <p id="valores">Depósitos: R$ 10, R$ 5, R$ 15, R$ 20</p>
        <button id="btn-reduzir">Calcular Total do Cofrinho</button>
    </div>
    <h2 id="resultado-total">Total: R$ 0</h2>
    <script src="ex63.js"></script>
</body>

</html>
