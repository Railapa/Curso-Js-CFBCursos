<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #campo-futebol {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }

        .card-jogador {
            background-color: #6eda73;
            /* Verde campo */
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            width: 150px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
            font-size: 1.3rem;
            font-family: Arial, Helvetica, sans-serif;
        }

        .btn-remover {
            display: block;
            margin: 20px auto 0;
            background-color: #d32f2f;
            color: white;
            border: none;
            padding: 5px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 1rem;
        }
    </style>
</head>

<body>
    <div class="entrada">
        <input type="text" id="nome-jogador" placeholder="Nome do jogador...">
        <button id="btn-escalar">Escalar Jogador</button>
    </div>

    <div id="campo-futebol">
    </div>
    <script src="ex39.js"></script>
</body>

</html>
