<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Configurações Globais */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            /* Azul marinho profundo */
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 450px;
            text-align: center;
        }

        h2 {
            color: #38bdf8;
            /* Azul claro */
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Área dos Dispositivos */
        .listas-origem {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 20px;
        }

        .listas-origem div {
            background: #334155;
            padding: 15px;
            border-radius: 10px;
            flex: 1;
            font-size: 0.85rem;
        }

        .listas-origem strong {
            display: block;
            margin-bottom: 10px;
            color: #94a3b8;
        }

        /* Resultado e Playlist */
        .resultado {
            background: #0f172a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #38bdf8;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 15px 0;
            min-height: 40px;
        }

        /* Estilo das "Tags" de Música */
        .musica-tag {
            background: #38bdf8;
            color: #0f172a;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            animation: popIn 0.3s ease;
        }

        #exclusivas_pc {
            color: #fbbf24;
            /* Amarelo para destaque */
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Botão Sincronizar */
        button {
            width: 100%;
            padding: 15px;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        button:hover {
            background: #7dd3fc;
            transform: translateY(-2px);
        }

        /* Animação simples */
        @keyframes popIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🎵 Sincronizador de Músicas</h2>

        <div class="listas-origem">
            <div>
                <strong>📱 Telemóvel:</strong>
                <p id="txt_telemovel"></p>
            </div>
            <div>
                <strong>💻 Computador:</strong>
                <p id="txt_computador"></p>
            </div>
        </div>

        <div class="resultado">
            <h4>🚀 Playlist Unificada:</h4>
            <div id="playlist_final" class="tags-container"></div>
            <p>Músicas exclusivas do PC: <span id="exclusivas_pc">0</span></p>
        </div>

        <button id="btn_sincronizar">Sincronizar Dispositivos</button>
    </div>
    <script src="ex162.js"></script>
</body>

</html>
