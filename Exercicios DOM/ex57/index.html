<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .login-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            display: inline-block;
        }

        input,
        button {
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #27ae60;
            color: white;
            cursor: pointer;
            border: none;
        }

        button:hover {
            background-color: #219150;
        }

        #msg-login {
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h3>Acesso ao Sistema</h3>
        <input type="text" id="input-user" placeholder="Digite seu usuário...">
        <button id="btn-login">Entrar</button>
    </div>

    <p id="msg-login">Aguardando login...</p>
    <script src="ex57.js"></script>
</body>

</html>
