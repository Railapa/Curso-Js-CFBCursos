<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prática JS - Galeria</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
            background: #f9f9f9;
        }

        .galeria {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        #fotoPrincipal {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .miniaturas {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .miniatura {
            width: 80px;
            height: 60px;
            object-fit: cover;
            cursor: pointer;
            border-radius: 5px;
            opacity: 0.6;
            transition: 0.3s;
        }

        .miniatura:hover {
            opacity: 1;
        }
    </style>
</head>

<body>

    <div class="galeria">
        <img id="fotoPrincipal" src="https://picsum.photos/id/10/400/250" alt="Grande">

        <div class="miniaturas">
            <img class="miniatura" src="https://picsum.photos/id/10/400/250" alt="Foto 1">
            <img class="miniatura" src="https://picsum.photos/id/20/400/250" alt="Foto 2">
            <img class="miniatura" src="https://picsum.photos/id/30/400/250" alt="Foto 3">
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
