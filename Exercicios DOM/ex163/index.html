<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 50px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            background: #f8f9fa;
            font-weight: bold;
        }

        .processando {
            color: #f59e0b;
            border: 2px solid #f59e0b;
            animation: blink 1s infinite;
        }

        .sucesso {
            color: #16a34a;
            border: 2px solid #16a34a;
            background: #dcfce7;
        }

        .erro {
            color: #dc2626;
            border: 2px solid #dc2626;
            background: #fee2e2;
        }

        @keyframes blink {
            50% {
                opacity: 0.5;
            }
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>💳 Checkout Seguro</h2>

        <div class="produto-info">
            <p>Item: Consola de Jogos</p>
            <p>Preço: <strong>R$ 500.00</strong></p>
        </div>

        <div id="status_pagamento" class="status">Aguardando confirmação...</div>

        <button id="btn_pagar">Confirmar e Pagar</button>
    </div>
    <script src="ex163.js"></script>
</body>

</html>
