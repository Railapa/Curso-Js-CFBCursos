<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Busca Dinâmica com Set</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #f0f2f5;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }

        input {
            padding: 10px;
            width: 85%;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            background: #0984e3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 92%;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .busca-section {
            border-top: 2px dashed #dfe6e9;
            padding-top: 15px;
        }

        ul {
            text-align: left;
            list-style: none;
            padding: 0;
        }

        li {
            background: #f1f2f6;
            margin-bottom: 5px;
            padding: 8px;
            border-radius: 4px;
            border-left: 4px solid #0984e3;
        }
    </style>
</head>

<body>
    <div class="card">
        <h3>👥 Cadastro de Convidados</h3>
        <input type="text" id="input_nome" placeholder="Novo nome...">
        <button id="btn_adicionar">Adicionar</button>

        <div class="busca-section">
            <p>🔍 Filtrar na lista:</p>
            <input type="text" id="input_busca" placeholder="Digite para buscar...">
            <ul id="lista_exibicao"></ul>
        </div>
    </div>
    <script src="ex138.js"></script>
</body>

</html>
