<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Validador de Passeio</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #f0f7ff;
        }

        .painel {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }

        .lista {
            text-align: left;
            font-size: 0.85rem;
            color: #555;
            background: #f9f9f9;
            padding: 10px;
            margin: 15px 0;
            border-radius: 8px;
        }

        button {
            padding: 12px;
            background: #0fbcf9;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        #msg_viagem {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
        }

        .liberado {
            background: #05c46b;
            color: white;
        }

        .negado {
            background: #f53b57;
            color: white;
        }
    </style>
</head>

<body>
    <div class="painel">
        <h3>🚌 Viagem de Formatura</h3>
        <div class="lista">
            - Ana: Média 8, Presença 90%<br>
            - Beto: Média 7, Presença 80%<br>
            - Caio: Média 6, Presença 76%
        </div>
        <button id="btn_verificar">Verificar Turma</button>
        <div id="msg_viagem">Resultado...</div>
    </div>
    <script src="ex125.js"></script>
</body>

</html>
