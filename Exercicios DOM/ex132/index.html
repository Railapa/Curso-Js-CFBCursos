<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Segurança do Trabalho</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #f1f2f6;
        }

        .painel {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }

        .lista-equipe {
            text-align: left;
            margin: 15px 0;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        button {
            padding: 12px;
            background: #2f3542;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        #status_seguranca {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
        }

        .liberado {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .bloqueado {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body>
    <div class="painel">
        <h3>👷 Controle de EPIs</h3>
        <div class="lista-equipe">
            - João: Capacete OK <br>
            - Maria: Capacete OK <br>
            - Pedro: Sem Capacete <br>
            - Ana: Capacete OK
        </div>
        <button id="btn_every">Checar Segurança</button>
        <div id="status_seguranca">Aguardando conferência...</div>
    </div>
    <script src="ex132.js"></script>
</body>

</html>
