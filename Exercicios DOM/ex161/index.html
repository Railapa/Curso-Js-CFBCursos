<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        input {
            flex-grow: 1;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 20px 0;
            min-height: 50px;
            padding: 10px;
            background: #f9fafb;
            border-radius: 8px;
        }

        .tag-item {
            background-color: #3b82f6;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .btn-secundario {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 8px;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
        }

        #total_tags {
            font-weight: bold;
            color: #3b82f6;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🏷️ Gerenciador de Tags</h2>

        <div class="input-group">
            <input type="text" id="in_tag" placeholder="Digite uma tag...">
            <button id="btn_add">Adicionar</button>
        </div>

        <div class="info">
            Total de tags exclusivas: <span id="total_tags">0</span>
        </div>

        <div id="lista_tags" class="tags-container">
        </div>

        <button id="btn_limpar" class="btn-secundario">Limpar Tudo</button>
    </div>
    <script src="ex161.js"></script>
</body>

</html>
