<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista VIP</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; background-color: #121212; color: white; }
        .container { background: #1e1e1e; padding: 25px; border-radius: 12px; width: 300px; text-align: center; border: 1px solid #333; }
        input { padding: 10px; width: 80%; margin-bottom: 10px; border-radius: 4px; border: none; }
        button { padding: 10px; width: 100%; background: #f1c40f; color: black; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        ul { text-align: left; margin-top: 20px; color: #f1c40f; }
    </style>
</head>
<body>
    <div class="container">
        <h3>🎫 Convidados VIP</h3>
        <input type="text" id="input_nome" placeholder="Nome do convidado">
        <button id="btn_adicionar">Adicionar à Lista</button>
        <ul id="lista_vip"></ul>
    </div>
    <script src="ex135.js"></script>
</body>
</html>
