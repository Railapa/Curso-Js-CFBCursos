<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>CineBusca</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #1a1a1a;
            color: white;
        }

        .container {
            background: #2c3e50;
            padding: 25px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
        }

        input {
            padding: 10px;
            width: 80%;
            border-radius: 5px;
            border: none;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        #detalhes_filme {
            margin-top: 20px;
            padding: 15px;
            background: #34495e;
            border-radius: 8px;
            min-height: 80px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .titulo-filme {
            color: #f1c40f;
            font-weight: bold;
            font-size: 1.1rem;
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h3>🎬 Consulta de Catálogo</h3>
        <input type="text" id="input_filme" placeholder="Digite: Matrix, Shrek ou Nemo">
        <button id="btn_consultar">Ver Sinopse</button>

        <div id="detalhes_filme">Aguardando pesquisa...</div>
    </div>

    <script src="ex109.js"></script>
</body>

</html>
