<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prática JS - Semáforo</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background: #333;
            color: white;
        }

        .semaforo {
            background: #111;
            padding: 20px;
            border-radius: 50px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .luz {
            width: 60px;
            height: 60px;
            background: #444;
            border-radius: 50%;
            transition: 0.3s;
        }

        /* Classes de cores */
        .vermelho {
            background: #ff4757;
            box-shadow: 0 0 20px #ff4757;
        }

        .amarelo {
            background: #eab000;
            box-shadow: 0 0 20px #eab000;
        }

        .verde {
            background: #2ed573;
            box-shadow: 0 0 20px #2ed573;
        }

        button {
            margin-top: 30px;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="semaforo">
        <div id="luzVermelha" class="luz"></div>
        <div id="luzAmarela" class="luz"></div>
        <div id="luzVerde" class="luz"></div>
    </div>

    <button id="btnMudar">Mudar Sinal</button>

    <script src="script.js"></script>
</body>

</html>
