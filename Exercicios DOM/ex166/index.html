<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 408 - Navegação e Histórico</title>
    <link rel="stylesheet" border="0" href="style.css">
</head>
<body>

    <main class="container">
        <h1>🛠️ Painel de Controle de Navegação</h1>
        <p>Use os botões abaixo para testar o <strong>window.location</strong> e <strong>window.history</strong>.</p>

        <div class="sessao">
            <h3>Redirecionamento</h3>
            <button id="btn_cfb" class="btn primary">Ir para CFB Cursos</button>
            <button id="btn_reload" class="btn secondary">Recarregar Página</button>
            <button id="btn_substituir" class="btn secondary">Subistituir</button>
        </div>

        <div class="sessao">
            <label for="">Digite um link valido</label>
            <input placeholder="https://youtu.be/aAdw_U7uTyE?si=oFBPLkBo5uVevj2g" type="text" name="" id="in_url">
            <button id="btn_navegar">Navegar</button>
        </div>

        <div class="sessao">
            <h3>Histórico</h3>
            <div class="controles-historico">
                <button id="btn_voltar" class="btn outline">← Voltar</button>
                <button id="btn_avancar" class="btn outline">Avançar -></button>
                <div class="input-group">
                    <input type="number" id="num_pular" placeholder="Ex: -2 ou 2">
                    <button id="btn_pular" class="btn dark">Pular (Go)</button>
                </div>
            </div>
        </div>

        <div id="info_historico" class="status-bar">
            Verificando histórico...
        </div>
    </main>

    <script type="module" src="ex166.js"></script>
</body>
</html>
