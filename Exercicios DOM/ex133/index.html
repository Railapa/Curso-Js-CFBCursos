<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gestão Academia</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #f5f6fa;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 320px;
            text-align: center;
        }

        .lista-alunos {
            text-align: left;
            margin: 15px 0;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        button {
            padding: 12px;
            background: #8e44ad;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        #msg_financeiro {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
        }

        .alerta {
            background: #fab1a0;
            color: #d63031;
        }

        .sucesso {
            background: #55efc4;
            color: #00b894;
        }
    </style>
</head>

<body>
    <div class="card">
        <h3>💪 Status de Mensalidades</h3>
        <div class="lista-alunos">
            - Ricardo: Pago ✅<br>
            - Juliana: Pendente ⏳<br>
            - Marcio: Pago ✅
        </div>
        <button id="btn_some">Verificar Pendências</button>
        <div id="msg_financeiro">Aguardando verificação...</div>
    </div>
    <script src="ex133.js"></script>
</body>

</html>
