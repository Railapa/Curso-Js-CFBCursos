<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .login-box {
            background: #2c3e50;
            padding: 20px;
            border-radius: 8px;
            color: white;
            width: 250px;
        }

        input {
            display: block;
            width: 90%;
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 4px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #27ae60;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        #msg-login {
            margin-top: 15px;
            font-weight: bold;
        }

        .erro {
            color: #e74c3c;
        }

        .sucesso {
            color: #27ae60;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h3>Área Restrita</h3>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button id="btn-entrar">Entrar</button>
    </div>
    <p id="msg-login">Aguardando login...</p>
    <script src="ex82.js"></script>
</body>

</html>
