<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prática JS - Calculadora de IMC</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            padding-top: 50px; 
            background: #f0f4f8; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 320px; 
            text-align: center;
        }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 1rem;
            font-weight: bold;
            margin-top: 10px;
        }
        #resultadoArea { 
            margin-top: 25px; 
            padding-top: 15px; 
            border-top: 2px solid #eee; 
        }
        #valorImc { font-size: 2rem; margin: 5px 0; color: #007bff; }
        #mensagem { font-weight: bold; font-size: 1.1rem; }
        
        /* Cores para os estados */
        .alerta { color: #e74c3c; } /* Vermelho para fora do peso */
        .sucesso { color: #27ae60; } /* Verde para peso normal */
    </style>
</head>
<body>

    <div class="container">
        <h3>Calculadora de IMC</h3>
        
        <div class="input-group">
            <label for="peso">Peso (kg):</label>
            <input type="number" id="peso" placeholder="Ex: 80.5" step="0.1">
        </div>

        <div class="input-group">
            <label for="altura">Altura (m):</label>
            <input type="number" id="altura" placeholder="Ex: 1.75" step="0.01">
        </div>

        <button id="btnCalcular">Calcular IMC</button>

        <div id="resultadoArea">
            <p>Seu IMC é:</p>
            <h2 id="valorImc">--</h2>
            <p id="mensagem">Aguardando dados...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
