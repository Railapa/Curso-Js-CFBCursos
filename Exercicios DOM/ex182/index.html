<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prática JS - Filtro de Projetos</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #f4f4f4;
            text-align: center;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin: auto;
        }

        input {
            width: 90%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        ul {
            list-style: none;
            padding: 0;
            text-align: left;
        }

        li {
            padding: 8px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

    <div class="container">
        <h3>Meus Projetos</h3>
        <input type="text" id="campoBusca" placeholder="Busque por tecnologia (ex: JS)">
        <ul id="listaProjetos">
        </ul>
    </div>

    <script src="script.js"></script>
</body>

</html>
