<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background: #fdfcf0;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 80%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        #res_historico {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: left;
            color: #475569;
            font-style: italic;
        }

        button {
            background: #06b6d4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="card">
        <h3>🔍 Histórico de Busca</h3>
        <input type="text" id="in_busca" placeholder="O que procuras?">
        <br>
        <button id="btn_buscar">Pesquisar</button>

        <p><strong>Pesquisas recentes:</strong></p>
        <div id="res_historico">Nenhuma pesquisa feita.</div>
    </div>
    <script src="ex154.js"></script>
</body>

</html>
