<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Tech - Filtro de Preço</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="vitrine">
        <h3>🛒 Filtro de Orçamento</h3>
        
        <div class="filtro-preco">
            <label for="input_preco">Quanto você quer gastar? (R$)</label>
            <input type="number" id="input_preco" placeholder="Ex: 500">
            <button id="btn_filtrar_preco">Filtrar por Preço</button>
        </div>

        <hr>

        <div id="lista_produtos">
            </div>
        
        <div class="controles-gerais">
            <button id="btn_promo" class="btn-promo">Ver Promoções</button>
            <button id="btn_limpar" class="btn-limpar">Mostrar Todos</button>
        </div>
    </div>

    <script src="ex105.js"></script>
</body>
</html>
