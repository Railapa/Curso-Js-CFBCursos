<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Suporte Retrátil</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: sans-serif;
            height: 100vh;
            margin: 0;
        }

        .suporte {
            position: fixed;
            bottom: -200px;
            /* Esconde a janela de chat (que tem 200px) */
            right: 30px;
            width: 250px;
            transition: all 0.5s ease;
            /* Animação suave de subida */
        }

        /* Classe que faz o chat subir */
        .suporte_aberto {
            bottom: 0 !important;
        }

        .aba_suporte {
            background-color: #007bff;
            color: white;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 10px 10px 0 0;
        }

        .janela_chat {
            height: 200px;
            background-color: #f1f1f1;
            border: 1px solid #ccc;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>

<body>
    <h1>Página Principal</h1>

    <div id="suporte" class="suporte">
        <div id="aba_suporte" class="aba_suporte">
            <span>💬 Precisa de ajuda?</span>
        </div>
        <div class="janela_chat">
            <p>Olá! Como podemos ajudar hoje?</p>
            <input type="text" placeholder="Digite sua dúvida...">
            <button>Enviar</button>
        </div>
    </div>

    <script src="ex95.js"></script>
</body>

</html>
