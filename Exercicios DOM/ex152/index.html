<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background: #fff7ed;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h3 {
            color: #9a3412;
        }

        #res_some {
            background: #ffedd5;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            min-height: 40px;
            font-weight: bold;
            color: #9a3412;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #f97316;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #ea580c;
        }
    </style>
</head>

<body>
    <div class="card">
        <h3>⚠️ Painel de Controle</h3>
        <p>Verificar se há falhas nos servidores:</p>
        <div id="res_some">Status: Desconhecido</div>
        <button id="btn_some">Verificar Integridade</button>
    </div>
    <script src="ex152.js"></script>
</body>

</html>
