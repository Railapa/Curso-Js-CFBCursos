<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Torre de Controle</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #2c3e50;
            color: white;
        }

        .painel {
            background: #34495e;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 320px;
            text-align: center;
        }

        #status_decolagem {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
        }

        .ready {
            background: #27ae60;
            color: white;
        }

        .wait {
            background: #e67e22;
            color: white;
        }
    </style>
</head>

<body>
    <div class="painel">
        <h3>✈️ Sistema de Decolagem</h3>
        <p>Status: Combustível OK, Motores OK, Tripulação OK</p>
        <button id="btn_check">Verificar Sistemas</button>
        <div id="status_decolagem">Aguardando...</div>
    </div>
    <script src="ex124.js"></script>
</body>

</html>
