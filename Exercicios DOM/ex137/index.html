<!DOCTYPE html>
<html lang="gl">

<head>
    <meta charset="UTF-8">
    <title>Mochila Trekking</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #e8f5e9;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 320px;
            text-align: center;
        }

        input {
            padding: 10px;
            width: 80%;
            margin-bottom: 10px;
            border: 1px solid #a5d6a7;
            border-radius: 5px;
        }

        button {
            padding: 10px;
            width: 100%;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .info {
            margin-top: 20px;
            padding: 10px;
            background: #f1f8e9;
            border-radius: 8px;
            border-left: 5px solid #2e7d32;
            text-align: left;
        }
    </style>
</head>

<body>
    <div class="box">
        <h3>🎒 A miña Mochila</h3>
        <input type="text" id="input_item" placeholder="Ex: Cantimplora, Mapa...">
        <button id="btn_engadir">Engadir á mochila</button>

        <div class="info">
            <p>Itens na mochila: <span id="total_itens">0</span></p>
            <ul id="lista_visual"></ul>
        </div>
    </div>
    <script src="ex137.js"></script>
</body>

</html>
