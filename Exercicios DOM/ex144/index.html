<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Simulador de Download</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #ecf0f1;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }

        input {
            padding: 10px;
            width: 80%;
            margin-bottom: 10px;
        }

        button {
            padding: 12px;
            width: 90%;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        #status {
            margin-top: 20px;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>
    <div class="box">
        <h3>📥 Downloader Assíncrono</h3>
        <input type="text" id="in_arquivo" placeholder="Nome do arquivo...">
        <input type="number" id="in_tamanho" placeholder="Tamanho (em MB)">
        <button id="btn_download">Baixar Arquivo</button>
        <p id="status">Aguardando comando...</p>
    </div>
    <script src="ex144.js"></script>
</body>

</html>
