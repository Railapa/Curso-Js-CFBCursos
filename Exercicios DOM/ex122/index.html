<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Checklist de Viagem</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #e8f4f8;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }

        .checklist {
            text-align: left;
            margin: 20px 0;
        }

        .item {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        button {
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .desativado {
            background: #b2bec3;
            color: #636e72;
            cursor: not-allowed;
        }

        .ativado {
            background: #0984e3;
            color: white;
        }
    </style>
</head>

<body>

    <div class="card">
        <h3>✈️ Checklist de Embarque</h3>
        <div class="checklist">
            <div class="item"><input type="checkbox" class="confirmacao"> Passaporte em mãos</div>
            <div class="item"><input type="checkbox" class="confirmacao"> Passagem comprada</div>
            <div class="item"><input type="checkbox" class="confirmacao"> Seguro viagem ativo</div>
            <div class="item"><input type="checkbox" class="confirmacao"> Malas despachadas</div>
        </div>

        <button id="btn_gerar" class="desativado" disabled>Gerar Roteiro PDF</button>
    </div>

    <script src="ex122.js"></script>
</body>

</html>
