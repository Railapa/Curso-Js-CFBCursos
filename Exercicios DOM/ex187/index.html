<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prática JS - Botão de Curtir</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
