<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #mural-notas {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
        }

        .nota {
            background-color: #ffff88;
            color: #333;
            padding: 15px;
            width: 200px;
            min-height: 150px;
            box-shadow: 5px 5px 7px rgba(0, 0, 0, 0.1);
            position: relative;
            font-family: 'Comic Sans MS', cursive;
        }

        .nota h3 {
            margin-top: 0;
            border-bottom: 1px solid #cccc66;
        }

        .btn-apagar {
            background: #cc0000;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        .interface{
            display: flex;
            gap: 1rem;
        }
    </style>
</head>

<body>
    <div class="interface">
        <input type="text" id="nota-titulo" placeholder="Título da nota...">
        <textarea id="nota-texto" placeholder="Conteúdo da nota..."></textarea>
        <button id="btn-salvar">Salvar Nota</button>
    </div>

    <div id="mural-notas">
    </div>
    <script src="ex40.js"></script>
</body>

</html>
