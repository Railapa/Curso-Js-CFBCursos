<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prática JS - Seletor de Cores</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background: #eee;
        }

        .box {
            width: 200px;
            height: 200px;
            background-color: #333;
            border-radius: 15px;
            margin: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: 0.2s;
        }

        input {
            cursor: pointer;
            width: 100px;
            height: 40px;
        }

        #codigoCor {
            font-weight: bold;
            font-family: monospace;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>

    <h3>Escolha uma cor para o quadrado</h3>
    <input type="color" id="seletor">

    <div class="box" id="quadrado"></div>

    <p>Cor selecionada: <span id="codigoCor">#333333</span></p>

    <script src="script.js"></script>
</body>

</html>
