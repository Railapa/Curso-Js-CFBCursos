<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Faxina de Dados</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #f4f4f9;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }

        .lista-suja {
            color: #888;
            font-style: italic;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        button {
            padding: 10px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        #resultado {
            margin-top: 20px;
            text-align: left;
        }

        .total {
            font-weight: bold;
            color: #27ae60;
        }
    </style>
</head>

<body>
    <div class="card">
        <h3>🧹 Faxineiro de Nomes</h3>
        <p>Lista original (com erros):</p>
        <div class="lista-suja">
            "Ana", "Pedro", "Ana", "Maria", "Pedro", "João"
        </div>

        <button id="btn_limpar">Remover Duplicados</button>

        <div id="resultado">
            <p>Nomes únicos: <span id="contagem" class="total">0</span></p>
            <ul id="lista_limpa"></ul>
        </div>
    </div>
    <script src="ex140.js"></script>
</body>

</html>
