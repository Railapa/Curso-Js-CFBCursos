<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background: #fefce8;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h3 {
            color: #854d0e;
        }

        #res_every {
            background: #fef9c3;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            min-height: 40px;
            font-family: sans-serif;
            font-weight: bold;
            color: #713f12;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #eab308;
            color: black;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #ca8a04;
        }
    </style>
</head>

<body>

    <div class="card">
        <h3>🔞 Verificação de Grupo</h3>
        <p>Lista: Hugo (20), Zé (17), Maria (25)</p>

        <div id="res_every">Aguardando verificação...</div>

        <button id="btn_every">Verificar Maioridade Geral</button>
    </div>

    <script src="ex151.js"></script>
</body>

</html>
