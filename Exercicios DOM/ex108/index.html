<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gerenciador de Preços</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #f4f4f4;
        }

        .painel {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 350px;
        }

        .lista {
            text-align: left;
            margin-bottom: 20px;
        }

        .item {
            border-bottom: 1px solid #eee;
            padding: 5px 0;
            display: flex;
            justify-content: space-between;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #8e44ad;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .preco-novo {
            color: #27ae60;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="painel">
        <h3>💰 Tabela de Preços</h3>
        <div id="lista_precos" class="lista"></div>
        <button id="btn_reajuste">Aplicar +10% de Aumento</button>
    </div>

    <script src="ex108.js"></script>
</body>

</html>
